<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TaskBoard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <header class="sidebar-brand">
          <h1>TaskBoard</h1>
          <p class="subtitle">Kanban de tarefas</p>
        </header>

        <nav class="project-nav" aria-label="Projetos">
          <h2 class="nav-label">Projetos</h2>
          <search class="project-search">
            <input
              type="search"
              id="projectSearch"
              placeholder="Buscar projeto"
              aria-label="Buscar projeto"
            />
          </search>
          <ul class="project-list" id="projectList"></ul>
        </nav>

        <form id="projectForm" class="sidebar-form">
          <input
            type="text"
            id="projectName"
            placeholder="Novo projeto"
            required
          />
          <input
            type="text"
            id="projectDescription"
            placeholder="Descrição (opcional)"
          />
          <button type="submit" class="btn btn-primary btn-block">
            + Criar projeto
          </button>
        </form>
      </aside>

      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <main class="content">
        <header class="content-header">
          <button
            class="menu-toggle"
            id="menuToggle"
            type="button"
            aria-label="Abrir menu"
            aria-expanded="false"
            aria-controls="sidebar"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="project-info">
            <h2 id="selectedProjectName">Selecione um projeto</h2>
            <p id="selectedProjectDesc" class="subtitle hidden"></p>
          </div>
        </header>

        <div class="content-body">
          <section
            class="empty-state"
            id="emptyState"
            aria-labelledby="empty-state-title"
          >
            <span class="empty-state-icon" aria-hidden="true">📋</span>
            <h2 id="empty-state-title">Nenhum projeto selecionado</h2>
            <p>
              Escolha um projeto no menu lateral ou crie um novo para ver as
              tarefas.
            </p>
          </section>

          <section
            class="project-view hidden"
            id="projectView"
            aria-label="Projeto selecionado"
          >
            <section class="new-task" aria-labelledby="new-task-title">
              <h2 id="new-task-title">Nova tarefa</h2>
              <form id="taskForm">
                <input
                  type="text"
                  id="taskTitle"
                  placeholder="Título da tarefa"
                  required
                />
                <input
                  type="text"
                  id="taskDescription"
                  placeholder="Descrição (opcional)"
                />
                <select id="taskPriority">
                  <option value="low">Baixa</option>
                  <option value="medium" selected>Média</option>
                  <option value="high">Alta</option>
                </select>
                <button type="submit" class="btn btn-primary">
                  Criar tarefa
                </button>
              </form>
            </section>

            <ul class="stats" id="stats" aria-label="Resumo das tarefas"></ul>

            <section class="board-grid" aria-label="Quadro de tarefas">
              <section
                class="column"
                data-status="todo"
                aria-labelledby="heading-todo"
              >
                <h2 id="heading-todo">A Fazer</h2>
                <ul class="column-content" id="column-todo"></ul>
              </section>
              <section
                class="column"
                data-status="doing"
                aria-labelledby="heading-doing"
              >
                <h2 id="heading-doing">Fazendo</h2>
                <ul class="column-content" id="column-doing"></ul>
              </section>
              <section
                class="column"
                data-status="done"
                aria-labelledby="heading-done"
              >
                <h2 id="heading-done">Concluído</h2>
                <ul class="column-content" id="column-done"></ul>
              </section>
            </section>
          </section>
        </div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
