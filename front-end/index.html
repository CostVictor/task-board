<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TaskBoard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <h1>TaskBoard</h1>
          <p class="subtitle">Kanban de tarefas</p>
        </div>

        <nav class="project-nav">
          <p class="nav-label">Projetos</p>
          <div class="project-search">
            <input
              type="search"
              id="projectSearch"
              placeholder="Buscar projeto"
              aria-label="Buscar projeto"
            />
          </div>
          <ul class="project-list" id="projectList"></ul>
        </nav>

        <form id="projectForm" class="sidebar-form">
          <input
            type="text"
            id="projectName"
            placeholder="Novo projeto"
            required
          />
          <input
            type="text"
            id="projectDescription"
            placeholder="Descrição (opcional)"
          />
          <button type="submit" class="btn btn-primary btn-block">
            + Criar projeto
          </button>
        </form>
      </aside>

      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <div class="content">
        <header class="content-header">
          <button
            class="menu-toggle"
            id="menuToggle"
            type="button"
            aria-label="Abrir menu"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="project-info">
            <h2 id="selectedProjectName">Selecione um projeto</h2>
            <p id="selectedProjectDesc" class="subtitle hidden"></p>
          </div>
        </header>

        <div class="content-body">
          <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📋</div>
            <h3>Nenhum projeto selecionado</h3>
            <p>
              Escolha um projeto no menu lateral ou crie um novo para ver as
              tarefas.
            </p>
          </div>

          <div class="project-view hidden" id="projectView">
            <section class="new-task">
              <h2>Nova tarefa</h2>
              <form id="taskForm">
                <input
                  type="text"
                  id="taskTitle"
                  placeholder="Título da tarefa"
                  required
                />
                <input
                  type="text"
                  id="taskDescription"
                  placeholder="Descrição (opcional)"
                />
                <select id="taskPriority">
                  <option value="low">Baixa</option>
                  <option value="medium" selected>Média</option>
                  <option value="high">Alta</option>
                </select>
                <button type="submit" class="btn btn-primary">
                  Criar tarefa
                </button>
              </form>
            </section>

            <section class="stats" id="stats"></section>

            <main class="board-grid">
              <div class="column" data-status="todo">
                <h2>A Fazer</h2>
                <div class="column-content" id="column-todo"></div>
              </div>
              <div class="column" data-status="doing">
                <h2>Fazendo</h2>
                <div class="column-content" id="column-doing"></div>
              </div>
              <div class="column" data-status="done">
                <h2>Concluído</h2>
                <div class="column-content" id="column-done"></div>
              </div>
            </main>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
